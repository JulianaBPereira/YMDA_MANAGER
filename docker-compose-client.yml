name: ymda_manager

services:
  backend:
    image: ymda_manager-backend:latest
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: ymda_manager_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on: []  # Só muda isso - remove dependência do postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}  # Muda para pegar do .env
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-ymda_manager}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Postgres}
    networks:
      - ymda-manager-network

  frontend:
    image: ymda_manager-frontend:latest
    build:
      context: .
      dockerfile: Web/Dockerfile
    container_name: ymda_manager_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - ymda-manager-network

networks:
  ymda-manager-network:
    driver: bridge