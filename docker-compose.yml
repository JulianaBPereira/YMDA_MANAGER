services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      # Scripts de 01 a 08 para inicialização do banco no Master
      - ./database/init_database.sql:/docker-entrypoint-initdb.d/01-init_database.sql:ro
      - ./database/migration_add_soft_delete.sql:/docker-entrypoint-initdb.d/02-migration_add_soft_delete.sql:ro
      - ./database/fix_unique_constraint_produtos.sql:/docker-entrypoint-initdb.d/03-fix_unique_constraint_produtos.sql:ro
      - ./database/add_data_criacao_produtos_modelos.sql:/docker-entrypoint-initdb.d/04-add_data_criacao_produtos_modelos.sql:ro
      - ./database/add_funcionarios_turnos.sql:/docker-entrypoint-initdb.d/05-add_funcionarios_turnos.sql:ro
      - ./database/add_turno_registros_producao.sql:/docker-entrypoint-initdb.d/06-add_turno_registros_producao.sql:ro
      - ./database/add_dispositivo_nome_column.sql:/docker-entrypoint-initdb.d/07-add_dispositivo_nome_column.sql:ro
      - ./database/fix_cancelamentos_fk.sql:/docker-entrypoint-initdb.d/08-fix_cancelamentos_fk.sql:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    image: controle_posto_solda-backend:latest
    build:
      context: .
      dockerfile: Server/Dockerfile
    container_name: backend_api
    restart: unless-stopped
    ports:
      - "${FLASK_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app-network

  frontend:
    image: controle_posto_solda-frontend:latest
    build:
      context: .
      dockerfile: Web/Dockerfile
    container_name: frontend_app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: