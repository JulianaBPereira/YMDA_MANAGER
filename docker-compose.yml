name: ymda_manager

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: ymda_manager_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ymda_manager}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Postgres}
    volumes:
      - ymda_manager_postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./Backend/Database/database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ymda-manager-network

  backend:
    image: ymda_manager-backend:latest
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: ymda_manager_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ymda_manager}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Postgres}
    networks:
      - ymda-manager-network

  frontend:
    image: ymda_manager-frontend:latest
    build:
      context: .
      dockerfile: Web/Dockerfile
    container_name: ymda_manager_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8001
    networks:
      - ymda-manager-network

networks:
  ymda-manager-network:
    driver: bridge

volumes:
  ymda_manager_postgres_data: